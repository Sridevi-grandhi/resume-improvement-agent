# Application name
spring.application.name=resume-improvement-agent

# Server runs on port 8080
server.port=8080

# ============================================
# PostgreSQL Database (Docker Container)
# ============================================
# Container started with:
#   docker run -d --name resume-pg \
#     -e POSTGRES_USER=postgres \
#     -e POSTGRES_PASSWORD=postgres \
#     -e POSTGRES_DB=resume_agent_db \
#     -p 5555:5432 postgres:16-alpine
# ============================================

# Database connection — values can be overridden by environment variables.
# Local development (default):  jdbc:postgresql://localhost:5556/resume_agent_db
# Inside Docker (compose sets): jdbc:postgresql://postgres:5432/resume_agent_db
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5556/resume_agent_db}

# Database credentials (overridable via env vars)
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA / Hibernate settings
# "update" = auto-create/update tables from entity classes
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
